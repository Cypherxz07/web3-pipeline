<!DOCTYPE html>
<html>
<head>
  <title>Whale Tracker</title>
  <style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { 
    background: linear-gradient(135deg, #1e1e2e 0%, #0f0f1e 100%);
    color: #e0e0e0;
    font-family: 'Courier New', monospace;
    padding: 30px;
    min-height: 100vh;
  }
  h1 { 
    font-size: 2.5em;
    margin-bottom: 30px;
    color: #00ff88;
    text-shadow: 0 0 10px rgba(0, 255, 136, 0.5);
  }
  .controls {
    background: rgba(255, 255, 255, 0.05);
    padding: 20px;
    border-radius: 10px;
    border: 1px solid rgba(0, 255, 136, 0.3);
    margin-bottom: 30px;
    display: flex;
    gap: 20px;
  }
  label { display: flex; align-items: center; gap: 10px; }
  select, input { 
    background: rgba(0, 0, 0, 0.5);
    border: 1px solid rgba(0, 255, 136, 0.5);
    color: #00ff88;
    padding: 8px 12px;
    border-radius: 5px;
    font-family: monospace;
  }
  button {
    background: rgba(0, 255, 136, 0.2);
    border: 1px solid rgba(0, 255, 136, 0.8);
    color: #00ff88;
    padding: 10px 20px;
    border-radius: 5px;
    cursor: pointer;
    font-weight: bold;
    transition: all 0.3s;
  }
  button:hover { background: rgba(0, 255, 136, 0.4); }
  table { 
    width: 100%;
    border-collapse: collapse;
    border: 1px solid rgba(0, 255, 136, 0.3);
    border-radius: 10px;
    overflow: hidden;
  }
  th { 
    background: rgba(0, 255, 136, 0.1);
    padding: 15px;
    text-align: left;
    border-bottom: 2px solid rgba(0, 255, 136, 0.5);
    color: #00ff88;
    font-weight: bold;
  }
  td { 
    padding: 12px 15px;
    border-bottom: 1px solid rgba(0, 255, 136, 0.1);
  }
  tr:hover { background: rgba(0, 255, 136, 0.05); }
  a { 
    color: #00ff88;
    text-decoration: none;
    font-weight: bold;
    transition: all 0.2s;
  }
  a:hover { text-shadow: 0 0 8px rgba(0, 255, 136, 0.8); }
</style>
</head>
<body>
  <h1>🐋 Whale Tracker</h1>
  
  <div>
    <label>Chain: <select id="chain"><option>ethereum</option><option>polygon</option><option>arbitrum</option></select></label>
    <label>Min: $<input type="number" id="minAmount" value="100000" min="100000" step="100000"></label>
    <button onclick="loadWhales()">Refresh</button>
  </div>

  <table id="whalesTable">
    <thead>
      <tr><th>Token</th><th>Amount</th><th>From</th><th>To</th><th>Block</th><th>Tx</th></tr>
    </thead>
    <tbody id="whalesBody"></tbody>
  </table>

  <script>
    async function loadWhales() {
      const chain = document.getElementById('chain').value;
      const minAmount = document.getElementById('minAmount').value;
      
      const res = await fetch(`http://localhost:5000/api/whales?chain=${chain}&min_amount=${minAmount}`);
      const whales = await res.json();
      
      const tbody = document.getElementById('whalesBody');
      tbody.innerHTML = whales.map(w => `
        <tr>
          <td>${w.token_symbol}</td>
          <td>$${w.amount_usd.toLocaleString()}</td>
          <td>${w.from_address.slice(0,6)}...${w.from_address.slice(-4)}</td>
          <td>${w.to_address.slice(0,6)}...${w.to_address.slice(-4)}</td>
          <td>${w.block_number}</td>
          <td><a href="https://etherscan.io/tx/${w.tx_hash}" target="_blank">↗</a></td>
        </tr>
      `).join('');
    }
    
    loadWhales();
    setInterval(loadWhales, 5000);
  </script>
</body>
</html>
